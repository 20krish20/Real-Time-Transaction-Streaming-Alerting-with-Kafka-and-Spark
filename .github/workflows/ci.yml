name: CI — Lint, Type-check, Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, production-rebuild]

env:
  PYTHON_VERSION: "3.9"
  # Prevent PySpark from trying to connect to real Kafka / Delta in unit tests
  KAFKA__BOOTSTRAP_SERVERS: "localhost:9092"
  KAFKA__SCHEMA_REGISTRY_URL: "http://localhost:8081"
  DELTA__BASE_PATH: "/tmp/test-delta"
  DELTA__CHECKPOINT_BASE: "/tmp/test-checkpoints"

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install ruff
        run: pip install ruff>=0.3.0

      - name: Run ruff check
        run: ruff check . --output-format=github

      - name: Run ruff format check
        run: ruff format --check .

  # ── Type check ───────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy pipeline/ producer/ --ignore-missing-imports

  # ── Unit tests ───────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: [lint]   # don't waste compute if lint fails
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Java (required for PySpark local mode)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            -m unit \
            --cov=pipeline \
            --cov=producer \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=120 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          flags: unit-tests
          fail_ci_if_error: false

  # ── Schema validation ─────────────────────────────────────────────────────────
  schema-validation:
    name: Validate Avro schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install fastavro
        run: pip install fastavro>=1.9.0

      - name: Validate transaction_event.avsc
        run: |
          python -c "
          import json, fastavro.schema
          schema = fastavro.schema.load_schema('schemas/transaction_event.avsc')
          print('transaction_event.avsc: OK — fields:', len(schema['fields']))
          "

      - name: Validate settlement_event.avsc
        run: |
          python -c "
          import json, fastavro.schema
          schema = fastavro.schema.load_schema('schemas/settlement_event.avsc')
          print('settlement_event.avsc: OK — fields:', len(schema['fields']))
          "
